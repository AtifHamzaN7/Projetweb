# Nom du workflow (visible dans l’onglet GitHub Actions)
name: CI

# Déclencheurs du workflow :
# - sur ouverture / mise à jour de Pull Request
# - sur push sur n’importe quelle branche
# - déclenchement manuel possible depuis GitHub UI
on:
  pull_request:
  push:
    branches: ["**"]
  workflow_dispatch:

# Permissions nécessaires :
# - contents: write  => permet de commit/push les tests générés
# - pull-requests: write => commenter les PR
permissions:
  contents: write
  pull-requests: write

jobs:
  # Job principal : build + tests + coverage
  build-test-coverage:
    # Anti-boucle : si c'est un commit/push fait par github-actions[bot],
    # on ne relance pas le workflow (sinon boucle infinie).
    if: "${{ github.actor != 'github-actions[bot]' }}"

    # Runner GitHub utilisé
    runs-on: ubuntu-latest

    steps:
      # Étape 1 : récupération du code source
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Étape 2 : installation du JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # Étape 3 : installation de Node.js
      - name: Set up Node.js (AI step)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Étape 4 : vérification de Docker
      - name: Check Docker (required for Testcontainers)
        run: docker info

      # Étape 5 : génération automatique de tests via IA
      - name: Generate tests with AI (single pass)
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          AI_TEST_REPAIR_ENABLED: "1"
          AI_TEST_REPAIR_MAX_ITERS: "2"
        run: |
          node script-test.mjs

      - name: Load impacted test filter
        id: testfilter
        if: "${{ always() }}"
        run: |
          set -euo pipefail
          FILTER=""
          if [ -f "ai-test-filter.txt" ]; then
            FILTER="$(tr -d '\n' < ai-test-filter.txt | xargs)"
          fi
          echo "filter=$FILTER" >> $GITHUB_OUTPUT
          if [ -n "$FILTER" ]; then
            echo "Impacted test filter: $FILTER"
            if [ -f "ai-impacted-tests.txt" ]; then
              echo "Impacted test files:";
              sed 's/^/- /' ai-impacted-tests.txt || true
            fi
            if [ -f "ai-impacted-classes.txt" ]; then
              echo "Impacted production classes (for coverage):";
              sed 's/^/- /' ai-impacted-classes.txt || true
            fi
          else
            echo "Impacted test filter is empty. Tests will be skipped."
          fi

      # NEW : Step Summary (A.java -> deps B.java C.java)
      - name: Summarize changed files and dependencies
        if: "${{ always() }}"
        run: |
          set -euo pipefail
          echo "## AI test generation inputs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "ai-deps-summary.txt" ]; then
            echo "Changed files and detected internal dependencies (jdeps transitive):" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat ai-deps-summary.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY

            echo "=== ai-deps-summary.txt (for logs) ==="
            cat ai-deps-summary.txt
          else
            echo "_No dependency summary produced (ai-deps-summary.txt missing)._ " >> $GITHUB_STEP_SUMMARY
            echo "ai-deps-summary.txt missing (nothing to print)"
          fi

      # NEW : Commentaire PR (uniquement sur pull_request)
      - name: Comment dependency map on PR
        if: "${{ github.event_name == 'pull_request' && always() }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BODY=$'### AI test generation context\n\nChanged files + detected internal dependencies (jdeps transitive):\n\n'
          if [ -f "ai-deps-summary.txt" ]; then
            BODY="$BODY\`\`\`\n$(cat ai-deps-summary.txt)\n\`\`\`\n"
          else
            BODY="$BODY(No dependency summary produced.)\n"
          fi
          gh pr comment ${{ github.event.pull_request.number }} --body "$BODY"

      # Étape 6 : exécution du build Maven + tests
      - name: Maven verify (skip tests - no impacted tests)
        if: "${{ steps.testfilter.outputs.filter == '' }}"
        working-directory: facade
        run: ./mvnw -B -ntp -DskipTests verify

      - name: Maven verify (impacted tests only)
        if: "${{ steps.testfilter.outputs.filter != '' }}"
        working-directory: facade
        run: ./mvnw -B -ntp -DfailIfNoTests=false -Dtest="${{ steps.testfilter.outputs.filter }}" verify

      # Étape 7 : calcul du coverage JaCoCo à partir du fichier CSV
      - name: Compute JaCoCo coverage
        id: cov
        if: "${{ steps.testfilter.outputs.filter != '' }}"
        run: |
          set -euo pipefail

          CSV="facade/target/site/jacoco/jacoco.csv"
          IMPACTED_CLASSES="ai-impacted-classes.txt"

          echo "=== JaCoCo debug ==="
          echo "CSV path: $CSV"
          echo "Impacted classes path: $IMPACTED_CLASSES"

          if [ ! -f "$CSV" ]; then
            echo "JaCoCo CSV not found at $CSV"
            echo "Make sure jacoco report is generated during mvn verify."
            exit 1
          fi

          echo "JaCoCo CSV header + first rows:"
          head -n 5 "$CSV" || true
          echo "JaCoCo CSV total rows: $(wc -l < "$CSV" | xargs)"

          if [ -f "$IMPACTED_CLASSES" ] && [ -s "$IMPACTED_CLASSES" ]; then
            echo "Computing coverage on impacted classes only (from $IMPACTED_CLASSES)"
            echo "Impacted classes (count=$(wc -l < "$IMPACTED_CLASSES" | xargs)) (showing up to 50):"
            sed 's/^/- /' "$IMPACTED_CLASSES" | head -n 50 || true

            TMP_PERCLASS="$(mktemp)"
            TMP_UNMATCHED="$(mktemp)"
            : > "$TMP_UNMATCHED"

            awk -F, -v clsfile="$IMPACTED_CLASSES" -v perclass="$TMP_PERCLASS" -v unmatched="$TMP_UNMATCHED" '
              BEGIN {
                allowCount = 0;
                while ((getline line < clsfile) > 0) {
                  gsub(/\r/, "", line);
                  if (line != "") {
                    allow[line] = 1;
                    allowCount += 1;
                  }
                }
                close(clsfile);
              }
              NR==1 { next }
              {
                key = $2 "." $3;
                if (allow[key]) {
                  missed += $4;
                  covered += $5;
                  classMiss[key] += $4;
                  classCov[key] += $5;
                  matched[key] = 1;
                }
              }
              END {
                matchedCount = 0;
                for (k in matched) matchedCount += 1;

                for (k in allow) {
                  if (!(k in matched)) print k > unmatched;
                }
                close(unmatched);

                for (k in matched) {
                  tm = classMiss[k] + classCov[k];
                  pct = (tm == 0) ? 0 : (classCov[k] / tm) * 100;
                  printf "%.2f\t%s\t%d\t%d\n", pct, k, classMiss[k], classCov[k] > perclass;
                }
                close(perclass);

                total = missed + covered;
                if (matchedCount == 0 || total == 0) {
                  printf "0.00";
                } else {
                  printf "%.2f", (covered/total)*100;
                }
              }
            ' "$CSV" > coverage.txt

            echo "Matched impacted classes in jacoco.csv: $(wc -l < "$TMP_PERCLASS" | xargs)"
            echo "Unmatched impacted classes (not found in jacoco.csv): $(wc -l < "$TMP_UNMATCHED" | xargs)"
            if [ -s "$TMP_UNMATCHED" ]; then
              echo "First unmatched impacted classes (up to 50):"
              sed 's/^/- /' "$TMP_UNMATCHED" | head -n 50 || true
            fi

            if [ -s "$TMP_PERCLASS" ]; then
              echo "Lowest covered impacted classes (pct\tFQCN\tmissed\tcovered) (up to 30):"
              sort -n "$TMP_PERCLASS" | head -n 30 || true
            fi

            rm -f "$TMP_PERCLASS" "$TMP_UNMATCHED" || true
          else
            echo "Computing coverage on all classes (no impacted classes file)"
            awk -F, '
              NR>1 { missed += $4; covered += $5; }
              END {
                total = missed + covered;
                if (total == 0) { printf "0.00"; }
                else { printf "%.2f", (covered/total)*100; }
              }
            ' "$CSV" > coverage.txt
          fi

          COV=$(cat coverage.txt)
          echo "coverage=$COV" >> $GITHUB_OUTPUT
          echo "JaCoCo instruction coverage: $COV%"

      # Étape 8 : vérification du seuil minimum de coverage
      - name: Enforce coverage threshold (50%)
        if: "${{ steps.testfilter.outputs.filter != '' }}"
        run: |
          set -euo pipefail
          THRESHOLD=50.00
          COV="${{ steps.cov.outputs.coverage }}"

          PASS=$(awk -v c="$COV" -v t="$THRESHOLD" \
            'BEGIN { print (c+0 >= t+0) ? "yes" : "no" }')

          if [ "$PASS" = "yes" ]; then
            echo "Coverage OK: $COV% (threshold $THRESHOLD%)"
            exit 0
          fi

          echo "Coverage too low: $COV% (threshold $THRESHOLD%)"
          exit 1

      # Étape 8.5 : COMMIT + PUSH des tests générés dans la branche courante (push uniquement)
      - name: Commit generated tests to current branch (push only)
        if: >-
          ${{
            success() &&
            github.event_name == 'push' &&
            github.ref_type == 'branch'
          }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="${GITHUB_REF_NAME}"
          git checkout "$BRANCH"

          git add facade/src/test/java

          if git diff --cached --quiet; then
            echo "No generated tests to commit."
            exit 0
          fi

          git commit -m "test(ai): add generated tests [skip ci]"
          git push origin "HEAD:$BRANCH"

      # Étape 9 : upload des tests générés comme artifact
      - name: Upload generated tests (artifact)
        if: "${{ always() }}"
        uses: actions/upload-artifact@v4
        with:
          name: generated-tests
          path: facade/src/test/java
          if-no-files-found: ignore

      # Étape 10 : commentaire automatique sur la PR si la CI échoue
      - name: Comment on PR if coverage too low
        if: "${{ failure() && github.event_name == 'pull_request' }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          COV="${{ steps.cov.outputs.coverage }}"
          THRESHOLD="50%"

          gh pr comment ${{ github.event.pull_request.number }} --body \
            "CI bloquee : coverage JaCoCo insuffisant

            Coverage actuel (instructions): ${COV}%
            Seuil requis: ${THRESHOLD}

            Des tests ont ete generes automatiquement (1 passage) et attaches en artifact 'generated-tests'.
            Merci d'ajouter ou d'ameliorer les tests puis relancer."